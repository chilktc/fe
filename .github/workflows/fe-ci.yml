name: fe-ci

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "CICD", "feat/**"]

permissions:
  contents: read

jobs:
  lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Detect test script
        id: detect
        shell: bash
        run: |
          node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)" \
            && echo "has_test=true" >> "$GITHUB_OUTPUT" \
            || echo "has_test=false" >> "$GITHUB_OUTPUT"

      - name: Test (if exists)
        if: steps.detect.outputs.has_test == 'true'
        run: npm test -- --ci

      - name: Build
        run: npm run build
