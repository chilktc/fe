<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>페이지를 찾을 수 없습니다</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "SUIT Variable", system-ui, sans-serif;
        background: #131415;
        color: #e9eaee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(
            circle at top,
            rgba(226, 47, 131, 0.18),
            transparent 32%
          ),
          #131415;
      }

      main {
        width: min(100%, 480px);
        padding: 40px 24px;
        border: 1px solid #3d3f43;
        border-radius: 24px;
        background: rgba(25, 26, 27, 0.94);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.3;
      }

      p {
        margin: 0;
        color: #adb1b9;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
      }

      a,
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 18px;
        border-radius: 10px;
        border: 0;
        cursor: pointer;
        font: inherit;
        text-decoration: none;
      }

      .primary {
        background: #e22f83;
        color: #131415;
      }

      .secondary {
        background: transparent;
        color: #c7cad1;
        border: 1px solid #55585d;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>페이지를 찾을 수 없습니다.</h1>
      <p>
        주소가 잘못되었거나, 페이지가 이동되었을 수 있습니다. 앱 경로라면 홈으로
        이동해 다시 시작해 주세요.
      </p>
      <div class="actions">
        <button class="secondary" type="button" onclick="window.history.back()">
          이전으로
        </button>
        <a class="primary" href="/">홈으로 이동</a>
      </div>
    </main>
  </body>
</html>
